services:
  - type: web
    name: streamcards-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: TWITCH_CLIENT_ID
        sync: false
      - key: TWITCH_CLIENT_SECRET
        sync: false
      - key: TWITCH_REDIRECT_URI
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: TWITCH_EVENTSUB_SECRET
        generateValue: true
      - key: TWITCH_WEBHOOK_CALLBACK_URL
        sync: false
